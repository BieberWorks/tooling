name: Docker Publish
on:
  push:
    branches: [main, staging, dev]
jobs:
  docker:
    permissions:        # nötig: Repo-Default ist read, reusable Workflows erben nur vom Caller
      contents: read
      packages: write
    uses: BieberWorks/tooling/.github/workflows/docker-publish.yml@main
    secrets: inherit
    with:
      dockerfile: Dockerfile
