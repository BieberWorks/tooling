name: .NET CI (reusable)

# Reusable Workflow: Build (+ optional Test) gegen GitHub Packages.
# Aufruf:
#   jobs:
#     ci:
#       uses: BieberWorks/tooling/.github/workflows/dotnet-ci.yml@main
#       secrets: inherit
#       with:
#         run_tests: true   # false fuer App-Hosts ohne Tests
on:
  workflow_call:
    inputs:
      run_tests:
        type: boolean
        default: true
    secrets:
      PACKAGES_TOKEN:
        required: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Configure BieberWorks package source
        run: |
          dotnet nuget remove source bieberworks-local || true
          dotnet nuget remove source bieberworks || true
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name bieberworks --username "${{ github.actor }}" \
            --password "${{ secrets.PACKAGES_TOKEN }}" --store-password-in-clear-text || true

      - run: dotnet build -c Release
      - name: Test
        if: ${{ inputs.run_tests }}
        run: dotnet test -c Release --no-build
