name: NuGet Release (reusable)

# Reusable Workflow: Tagging (SemVer) + Pack + Push zu GitHub Packages + Release.
# Aufruf aus einem Modul-Repo:
#   jobs:
#     release:
#       uses: BieberWorks/tooling/.github/workflows/nuget-release.yml@v1
#       secrets: inherit
on:
  workflow_call:
    secrets:
      PACKAGES_TOKEN:
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # SemVer-Version aus Conventional Commits BERECHNEN, aber noch NICHT taggen
      # (dry_run). So kann der Test-Gate VOR dem Tag laufen — schlaegt der Test fehl,
      # entsteht kein verwaister -rc/final-Tag, der vor einem Rerun geloescht werden muesste.
      - name: Compute version (SemVer, dry-run)
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          pre_release_branches: staging
          append_to_pre_release_tag: rc
          dry_run: true

      - name: Setup .NET
        if: hashFiles('**/*.csproj') != ''
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Configure BieberWorks package source
        if: hashFiles('**/*.csproj') != ''
        run: |
          dotnet nuget remove source bieberworks-local || true
          dotnet nuget remove source bieberworks || true
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name bieberworks --username "${{ github.actor }}" \
            --password "${{ secrets.PACKAGES_TOKEN }}" --store-password-in-clear-text || true

      # Release-Gate: Tests muessen gruen sein, BEVOR getaggt/gepackt/gepusht wird.
      # Faengt sporadisch fehlerhafte Builds ab (z.B. wenn Quelldateien aus der
      # Kompilierung fallen) -> es wird nie ein kaputtes Paket veroeffentlicht UND
      # kein verwaister Tag erzeugt. Laeuft nur, wenn ein Release ansteht (new_version).
      - name: Test (Release-Gate)
        # Nur bei echter Solution im Repo-Root (Module/App-Hosts). Template-Paket-Repos
        # (z.B. DotnetTemplates) haben keine .slnx -> Gate wird sauber uebersprungen;
        # deren content/**-Testprojekte sind nur Paket-Inhalt, nicht baubar.
        if: hashFiles('*.slnx', '*.sln') != '' && steps.version.outputs.new_version != ''
        run: dotnet test -c Release

      # Echten Tag JETZT erst erzeugen+pushen — nach grunem Test-Gate.
      # Idempotent zur dry-run-Berechnung oben (gleiche Commits => gleiche Version).
      - name: Create tag (SemVer)
        id: tagger
        if: steps.version.outputs.new_version != ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main
          pre_release_branches: staging
          append_to_pre_release_tag: rc

      - name: Pack
        if: hashFiles('**/*.csproj') != '' && steps.tagger.outputs.new_version != ''
        run: dotnet pack -c Release -p:Version=${{ steps.tagger.outputs.new_version }} -o ./artifacts

      - name: Push to GitHub Packages
        if: hashFiles('**/*.csproj') != '' && steps.tagger.outputs.new_version != ''
        run: dotnet nuget push "./artifacts/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && steps.tagger.outputs.new_tag != ''
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tagger.outputs.new_tag }}
          name: Release ${{ steps.tagger.outputs.new_tag }}
          body: ${{ steps.tagger.outputs.changelog }}
