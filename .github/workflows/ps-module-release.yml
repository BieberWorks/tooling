name: Publish PowerShell Module

on:
  push:
    tags:
      - 'ps-v*'

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy templates into module
        run: cp -r templates/ powershell/modules/BieberWorks.RepoSetup/templates/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#ps-v}" >> $GITHUB_OUTPUT

      - name: Update module version
        shell: pwsh
        run: |
          $path = "powershell/modules/BieberWorks.RepoSetup/BieberWorks.RepoSetup.psd1"
          $content = Get-Content $path -Raw
          $content = $content -replace "ModuleVersion\s*=\s*'[^']*'", "ModuleVersion     = '${{ steps.version.outputs.version }}'"
          Set-Content $path $content -NoNewline

      - name: Publish module
        shell: pwsh
        run: |
          Register-PSResourceRepository -Name BieberWorks `
            -Uri "https://nuget.pkg.github.com/BieberWorks/index.json" `
            -Trusted
          Publish-PSResource -Path "powershell/modules/BieberWorks.RepoSetup" `
            -Repository BieberWorks `
            -ApiKey "${{ secrets.GITHUB_TOKEN }}"
