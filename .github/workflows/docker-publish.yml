name: Docker Publish (reusable)

# Reusable Workflow: Docker-Image bauen + nach GHCR pushen.
# Tags: latest(main) / staging / dev / sha-<sha>.
# Der Build reicht PACKAGES_TOKEN per BuildKit-Secret in den `dotnet restore`
# (private BieberWorks-Pakete), ohne es in die Image-History zu leaken.
# Aufruf:
#   jobs:
#     docker:
#       uses: BieberWorks/tooling/.github/workflows/docker-publish.yml@v1
#       secrets: inherit
#       with:
#         dockerfile: Dockerfile
on:
  workflow_call:
    inputs:
      dockerfile:
        type: string
        default: Dockerfile
    secrets:
      PACKAGES_TOKEN:
        required: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            nuget_token=${{ secrets.PACKAGES_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
